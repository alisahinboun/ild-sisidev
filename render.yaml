services:
  - type: web
    name: alan-simulasyon-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alan-simulasyon-db
          property: connectionString

databases:
  - name: alan-simulasyon-db
    plan: free
